license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
# ASCII-only escape sequence so the name is correct in-game even if Gradle expands resources with a wrong charset on Windows
displayName="\u5b9e\u7528\u5de5\u5177\u7bb1"
description='''
Multiple small utilities in one mod. Includes configurable item stack sizes (all items, including vanilla non-stackables); more modules can be toggled in the config screen. Merging still requires identical item data.
'''
[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
